<span class="lang-switcher" id="lang-switcher">
  <a href="#" id="lang-zh-btn">中文</a>
  <span class="lang-sep"></span>
  <a href="#" id="lang-en-btn">EN</a>
</span>
<script>
(function () {
  var path = window.location.pathname;
  var isEn = path.indexOf('/docs/en') !== -1;

  var zhPath = isEn ? path.replace('/docs/en', '/docs') : path;
  var enPath = isEn ? path : path.replace('/docs/', '/docs/en/');

  var zhBtn = document.getElementById('lang-zh-btn');
  var enBtn = document.getElementById('lang-en-btn');
  if (zhBtn) { zhBtn.href = zhPath; if (!isEn) zhBtn.className = 'lang-active'; }
  if (enBtn) { enBtn.href = enPath; if (isEn) enBtn.className = 'lang-active'; }
})();
</script>
